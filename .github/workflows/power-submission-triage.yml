name: Power submission triage

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

# This workflow intentionally checks out and executes only the trusted base
# branch. Candidate evidence is read from the pull-request git object.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    name: Power submission intake
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test trusted intake and ranking rules
        run: >-
          python3 -m unittest
          tests.test_power_1_1_compatible_runners
          tests.test_power_1_1_2_compatible_runners
          tests.test_power_submission_1_1
          tests.test_power_submission_pr_triage
          tests.test_power_community_ranking
          tests.test_community_onboarding
          tests.test_power_model_catalog
          tests.test_public_surface
          -v
      - name: Fetch candidate evidence without checking it out
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: git fetch --no-tags origin "pull/${PR_NUMBER}/head:refs/remotes/origin/power-intake-${PR_NUMBER}"
      - name: Classify submission packages
        id: triage
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 -m scripts.triage_power_submission_pr_1_1_2 \
            --base "$BASE_SHA" \
            --head "refs/remotes/origin/power-intake-${PR_NUMBER}" \
            --expected-contributor "$PR_AUTHOR" \
            --output /tmp/power-submission-triage.json || true
          classification="$(python3 -c 'import json; print(json.load(open("/tmp/power-submission-triage.json"))["classification"])')"
          echo "classification=$classification" >> "$GITHUB_OUTPUT"
          echo '### Power submission triage' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "Classification: **$classification**" >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/power-submission-triage.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload machine-readable triage report
        uses: actions/upload-artifact@v4
        with:
          name: power-submission-triage
          path: /tmp/power-submission-triage.json
      - name: Apply triage label
        if: steps.triage.outputs.classification != 'not_applicable'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CLASSIFICATION: ${{ steps.triage.outputs.classification }}
        run: |
          gh label create "power:auto-accept" --repo "$REPOSITORY" --color 1f883d --force
          gh label create "power:manual-review" --repo "$REPOSITORY" --color bf8700 --force
          gh label create "power:rejected" --repo "$REPOSITORY" --color cf222e --force
          for label in power:auto-accept power:manual-review power:rejected; do
            gh pr edit "$PR_NUMBER" --repo "$REPOSITORY" --remove-label "$label" 2>/dev/null || true
          done
          case "$CLASSIFICATION" in
            auto_accept) label="power:auto-accept" ;;
            manual_review) label="power:manual-review" ;;
            *) label="power:rejected" ;;
          esac
          gh pr edit "$PR_NUMBER" --repo "$REPOSITORY" --add-label "$label"
      - name: Reject invalid intake
        if: steps.triage.outputs.classification == 'rejected'
        run: |
          echo "Power submission intake was rejected; see the triage report." >&2
          exit 1
