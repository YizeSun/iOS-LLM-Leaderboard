name: Power submission auto-merge

on:
  workflow_run:
    workflows:
      - Power submission triage
      - Commit identity integrity
    types: [completed]

# A GITHUB_TOKEN merge does not emit a new push workflow run. After a clean
# evidence PR merges, explicitly dispatch the trusted ranking workflow so the
# live community view is regenerated from the new main revision.
permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge accepted Power submission
    if: github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'pull_request_target'
    runs-on: ubuntu-latest
    concurrency:
      group: power-submission-auto-merge-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Merge when classification and required checks are ready
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            HEAD_OWNER="${HEAD_REPOSITORY%%/*}"
            PR_NUMBER="$(gh api --method GET "repos/$REPOSITORY/pulls" \
              -f state=open \
              -f head="$HEAD_OWNER:$HEAD_BRANCH" \
              --jq '.[0].number // empty')"
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "Unable to resolve an open pull request for $HEAD_REPOSITORY:$HEAD_BRANCH." >&2
            exit 1
          fi
          pr_head_sha="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefOid --jq .headRefOid)"
          if [ "$pr_head_sha" != "$HEAD_SHA" ]; then
            echo "Resolved PR head $pr_head_sha does not match completed workflow head $HEAD_SHA." >&2
            exit 1
          fi
          state="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state --jq .state)"
          draft="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json isDraft --jq .isDraft)"
          accepted="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json labels --jq 'any(.labels[].name; . == "power:auto-accept")')"
          if [ "$state" != "OPEN" ] || [ "$draft" != "false" ] || [ "$accepted" != "true" ]; then
            echo "PR is not an open, ready, automatically accepted Power submission."
            exit 0
          fi
          checks_ready="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json statusCheckRollup --jq '
            (any(.statusCheckRollup[]; .workflowName == "Power submission triage" and .name == "Power submission intake" and .conclusion == "SUCCESS")) and
            (any(.statusCheckRollup[]; .workflowName == "Commit identity integrity" and .name == "Validate commit identity" and .conclusion == "SUCCESS"))
          ')"
          if [ "$checks_ready" != "true" ]; then
            echo "Trusted intake and commit-identity checks are not both successful yet."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --squash
          gh workflow run power-community-ranking.yml --repo "$REPOSITORY" --ref main
