name: Power community ranking

on:
  pull_request:
    paths:
      - "apps/**"
      - "models/**"
      - "products/power/**"
      - "submissions/power/**"
      - "results/power/**"
      - "scripts/power"
      - "scripts/repoctl.py"
      - "scripts/triage_power2_submission_pr.py"
      - "scripts/lib/power2/**"
      - "tests/test_power_2_*.py"
      - "docs/**"
      - "contributor-kit/**"
      - "README.md"
      - "index.html"
      - "site/**"
      - ".github/workflows/power-community-ranking.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "models/**"
      - "products/power/**"
      - "submissions/power/**"
      - "results/power/**"
      - "scripts/power"
      - "scripts/repoctl.py"
      - "scripts/triage_power2_submission_pr.py"
      - "scripts/lib/power2/**"
      - "docs/**"
      - "contributor-kit/**"
      - "README.md"
      - "index.html"
      - "site/**"
      - ".github/workflows/power-community-ranking.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Power community ranking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test Power 2 product, intake, and ranking rules
        run: >-
          python3 -m unittest
          tests.test_power_2_candidate
          tests.test_power_2_engine
          tests.test_power_2_runner_components
          tests.test_power_2_app_shell
          -v
      - name: Validate current Power packages
        env:
          VALIDATOR_SOURCE_REVISION: ${{ github.sha }}
        run: >-
          python3 scripts/power validate
          submissions/power/text-generation-performance/2.0.0/draft
          --validator-source-revision "$VALIDATOR_SOURCE_REVISION"
      - name: Generate community ranking preview
        env:
          VALIDATOR_SOURCE_REVISION: ${{ github.sha }}
        run: >-
          python3 scripts/power preview
          --output /tmp/power-community-ranking
          --validator-source-revision "$VALIDATOR_SOURCE_REVISION"
      - name: Upload ranking preview
        uses: actions/upload-artifact@v4
        with:
          name: power-community-ranking-preview
          path: /tmp/power-community-ranking

  deploy:
    name: Deploy Power community ranking
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate live Power 2 ranking
        env:
          VALIDATOR_SOURCE_REVISION: ${{ github.sha }}
        run: >-
          python3 scripts/power preview
          --validator-source-revision "$VALIDATOR_SOURCE_REVISION"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
