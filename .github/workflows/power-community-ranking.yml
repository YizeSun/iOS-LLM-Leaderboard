name: Power community ranking

on:
  pull_request:
    paths:
      - "submissions/suite-b/power-1.1.0/**"
      - "submissions/suite-b/power-1.0.0-rc.1/**"
      - "schemas/suite-b-power-submission-1.1.0.schema.json"
      - "schemas/suite-b-power-compatible-runners-1.1.1.schema.json"
      - "schemas/suite-b-power-compatible-runners-1.1.2.schema.json"
      - "schemas/suite-b-power-compatible-runners-1.1.3.schema.json"
      - "benchmarks/suite-b-on-device-performance/power-1.1-compatible-runners-1.1.1.json"
      - "benchmarks/suite-b-on-device-performance/power-1.1-compatible-runners-1.1.2.json"
      - "benchmarks/suite-b-on-device-performance/power-1.1-compatible-runners-1.1.3.json"
      - "benchmarks/suite-b-on-device-performance/power-compatible-runners-current.json"
      - "benchmarks/suite-b-on-device-performance/releases/suite-b-power-1.1.1.json"
      - "benchmarks/suite-b-on-device-performance/releases/suite-b-power-1.1.2.json"
      - "benchmarks/suite-b-on-device-performance/releases/suite-b-power-1.1.3.json"
      - "scripts/power.py"
      - "scripts/power_1_1_2.py"
      - "scripts/power_1_1_3.py"
      - "scripts/validate_suite_b_power_1_1_compatible_result.py"
      - "scripts/validate_suite_b_power_1_1_compatible_result_1_1_2.py"
      - "scripts/validate_suite_b_power_1_1_compatible_result_1_1_3.py"
      - "scripts/validate_suite_b_power_1_1_submission.py"
      - "scripts/validate_suite_b_power_1_1_submission_1_1_2.py"
      - "scripts/validate_suite_b_power_1_1_submission_1_1_3.py"
      - "scripts/generate_power_community_ranking.py"
      - "scripts/generate_power_community_ranking_1_1_2.py"
      - "scripts/generate_power_community_ranking_1_1_3.py"
      - "scripts/validate_power_pr_contributor.py"
      - "scripts/triage_power_submission_pr.py"
      - "scripts/triage_power_submission_pr_1_1_2.py"
      - "scripts/triage_power_submission_pr_1_1_3.py"
      - "tests/test_power_community_ranking.py"
      - "tests/test_power_1_1_compatible_runners.py"
      - "tests/test_power_1_1_2_compatible_runners.py"
      - "tests/test_power_1_1_3_compatible_runners.py"
      - "tests/test_community_onboarding.py"
      - "tests/test_power_model_catalog.py"
      - "tests/test_public_surface.py"
      - "tests/test_power_submission_pr_triage.py"
      - "results/suite-b-power-community/**"
      - "results/suite-b-power-1.0/**"
      - "results/suite-b-power-1.1/**"
      - "results/ship-1.0/**"
      - "models/power-test-catalog.json"
      - "docs/power.md"
      - "index.html"
      - ".nojekyll"
      - "site/**"
      - "contributor-kit/power-1.1-quickstart.md"
      - "contributor-kit/test-recommended-model.md"
  push:
    branches: [main]
    paths:
      - "submissions/suite-b/power-1.1.0/**"
      - "submissions/suite-b/power-1.0.0-rc.1/**"
      - "schemas/suite-b-power-compatible-runners-1.1.1.schema.json"
      - "schemas/suite-b-power-compatible-runners-1.1.2.schema.json"
      - "schemas/suite-b-power-compatible-runners-1.1.3.schema.json"
      - "benchmarks/suite-b-on-device-performance/power-1.1-compatible-runners-1.1.1.json"
      - "benchmarks/suite-b-on-device-performance/power-1.1-compatible-runners-1.1.2.json"
      - "benchmarks/suite-b-on-device-performance/power-1.1-compatible-runners-1.1.3.json"
      - "benchmarks/suite-b-on-device-performance/power-compatible-runners-current.json"
      - "benchmarks/suite-b-on-device-performance/releases/suite-b-power-1.1.1.json"
      - "benchmarks/suite-b-on-device-performance/releases/suite-b-power-1.1.2.json"
      - "benchmarks/suite-b-on-device-performance/releases/suite-b-power-1.1.3.json"
      - "scripts/power.py"
      - "scripts/power_1_1_2.py"
      - "scripts/power_1_1_3.py"
      - "scripts/validate_suite_b_power_1_1_compatible_result.py"
      - "scripts/validate_suite_b_power_1_1_compatible_result_1_1_2.py"
      - "scripts/validate_suite_b_power_1_1_compatible_result_1_1_3.py"
      - "scripts/validate_suite_b_power_1_1_submission.py"
      - "scripts/validate_suite_b_power_1_1_submission_1_1_2.py"
      - "scripts/validate_suite_b_power_1_1_submission_1_1_3.py"
      - "scripts/generate_power_community_ranking.py"
      - "scripts/generate_power_community_ranking_1_1_2.py"
      - "scripts/generate_power_community_ranking_1_1_3.py"
      - "scripts/triage_power_submission_pr_1_1_2.py"
      - "scripts/triage_power_submission_pr_1_1_3.py"
      - "results/suite-b-power-community/**"
      - "results/suite-b-power-1.0/**"
      - "results/suite-b-power-1.1/**"
      - "results/ship-1.0/**"
      - "models/power-test-catalog.json"
      - "docs/power.md"
      - "index.html"
      - ".nojekyll"
      - "site/**"
      - "contributor-kit/power-1.1-quickstart.md"
      - "contributor-kit/test-recommended-model.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Power community ranking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bind new submission manifests to the pull-request author
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- 'submissions/suite-b/power-1.1.0/draft/*/submission.json' 'submissions/suite-b/power-1.0.0-rc.1/draft/*/submission.json' > /tmp/power-submission-manifests.txt
          python3 scripts/validate_power_pr_contributor.py --expected-contributor "$PR_AUTHOR" --paths-file /tmp/power-submission-manifests.txt
      - name: Test community ranking rules
        run: python3 -m unittest tests.test_power_1_1_compatible_runners tests.test_power_1_1_2_compatible_runners tests.test_power_1_1_3_compatible_runners tests.test_power_submission_1_1 tests.test_power_submission_pr_triage tests.test_power_community_ranking tests.test_community_onboarding tests.test_power_model_catalog tests.test_public_surface -v
      - name: Validate current Power 1.1 intake
        run: python3 scripts/validate_suite_b_power_1_1_submission_1_1_3.py submissions/suite-b/power-1.1.0/draft --output /tmp/suite-b-power-1.1-intake-report.json
      - name: Generate community ranking preview
        run: python3 scripts/generate_power_community_ranking_1_1_3.py --output /tmp/power-community-ranking
      - name: Upload ranking preview
        uses: actions/upload-artifact@v4
        with:
          name: power-community-ranking-preview
          path: |
            /tmp/power-community-ranking
            /tmp/suite-b-power-1.1-intake-report.json

  deploy:
    name: Deploy Power community ranking
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate live community ranking
        run: python3 scripts/generate_power_community_ranking_1_1_3.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
