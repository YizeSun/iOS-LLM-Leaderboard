<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title description">
  <title id="title">Compare small LLMs on real iPhones</title>
  <desc id="description">The iOS LLM Leaderboard compares speed, memory, thermal behavior, and ship readiness using reproducible on-device evidence.</desc>

  <rect width="1200" height="260" rx="20" fill="#18181b"/>
  <rect x="1" y="1" width="1198" height="258" rx="19" fill="none" stroke="#3f3f46" stroke-width="2"/>
  <rect x="536" y="30" width="128" height="4" rx="2" fill="#c45a5a"/>

  <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="600" y="61" fill="#d8a0a0" font-size="12" font-weight="700" letter-spacing="2.3">IOS LLM LEADERBOARD · OPEN BENCHMARK</text>
    <text x="600" y="126" fill="#faf7f2" font-size="46" font-weight="760" letter-spacing="-2">Compare small LLMs on real iPhones</text>
    <text x="600" y="166" fill="#b9b4ae" font-size="18" font-weight="450">Speed, memory, thermals, and ship readiness — measured on-device.</text>

    <text x="600" y="213" font-size="12" font-weight="700" letter-spacing="1.5">
      <tspan fill="#d98989">POWER 1.1</tspan>
      <tspan fill="#67676f">  ·  </tspan>
      <tspan fill="#e7e1db">SHIP 1.0</tspan>
      <tspan fill="#67676f">  ·  </tspan>
      <tspan fill="#9f9993">BUILD RESEARCH</tspan>
    </text>
  </g>
</svg>
