<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title description">
  <title id="title">iOS LLM Leaderboard</title>
  <desc id="description">An open benchmark standard for reproducible, reviewable on-device language-model evidence on Apple platforms.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#3a2c25" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="22" fill="#1b1714"/>
  <rect x="1" y="1" width="1198" height="318" rx="21" fill="none" stroke="#5b4437" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="318" rx="21" fill="url(#grid)" opacity=".38"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="62" y="52" width="5" height="190" rx="2.5" fill="#d96b43"/>
    <text x="96" y="60" fill="#e5a17f" font-size="12" font-weight="700" letter-spacing="2.4">IOS LLM LEADERBOARD · OPEN BENCHMARK</text>
    <text x="94" y="132" fill="#fff8ee" font-size="54" font-weight="760" letter-spacing="-2.5">Compare small LLMs</text>
    <text x="94" y="192" fill="#fff8ee" font-size="54" font-weight="760" letter-spacing="-2.5">on real iPhones</text>
    <text x="96" y="232" fill="#c9b9ac" font-size="18" font-weight="450">Speed, memory, thermals, and ship readiness — measured on-device.</text>

    <g transform="translate(94 270)" font-size="12" font-weight="700" letter-spacing="1.5">
      <text x="0" y="0" fill="#e5a17f">POWER 1.1</text>
      <circle cx="96" cy="-4" r="2" fill="#6d5141"/>
      <text x="112" y="0" fill="#eaded2">SHIP 1.0</text>
      <circle cx="194" cy="-4" r="2" fill="#6d5141"/>
      <text x="210" y="0" fill="#a99585">BUILD RESEARCH</text>
    </g>
  </g>

  <g transform="translate(836 72)" fill="none" stroke-linecap="round">
    <path d="M0 176C46 78 104 30 220 14" stroke="#5b4437" stroke-width="2"/>
    <path d="M38 190C83 112 136 70 254 53" stroke="#7f533e" stroke-width="3"/>
    <path d="M78 204C124 147 177 118 286 103" stroke="#d96b43" stroke-width="5"/>
    <circle cx="286" cy="103" r="7" fill="#d96b43" stroke="none"/>
    <circle cx="254" cy="53" r="5" fill="#b77a5d" stroke="none"/>
    <circle cx="220" cy="14" r="4" fill="#7a5b49" stroke="none"/>
  </g>
</svg>
